# Continuous integration for Food Transparency UK.
# Runs the prebuild gates, the negative-fixture suite, the build, a production
# dependency audit and the pa11y-ci accessibility floor on every push and pull
# request, so a bad commit cannot merge. Mirrors the gates that Netlify runs at
# deploy time (npm run build fires the prebuild chain).
name: CI

on:
  push:
  pull_request:

# Least privilege: the job only reads the repository. It never writes contents,
# packages or deployments. pull_request (not pull_request_target) keeps a fork
# pull request from gaining write access to this repository's secrets.
permissions:
  contents: read

jobs:
  gates:
    name: Gates, tests, build and accessibility floor
    runs-on: ubuntu-latest
    steps:
      # Actions are pinned to full commit SHAs resolved from their release tags
      # (git ls-remote), not mutable @v4 tags. A repointed tag is the tj-actions /
      # Shai-Hulud 2025 supply-chain vector; a pinned SHA cannot be moved.
      # Dependabot (.github/dependabot.yml) keeps these pins current.
      - name: Check out the repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Node.js 24
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies from the committed lockfile
        run: npm ci

      # Audit the WHOLE dependency tree. On a static site every dependency runs
      # at build time on the runner and the Netlify build host, so the dev tree
      # (pa11y to pa11y to puppeteer) is exactly the supply-chain surface the
      # SHA-pin defence above protects, and must not be exempted. The level is
      # set to "critical" rather than "high" so the routine high-severity
      # puppeteer-chain advisories (no runtime relevance to static HTML) do not
      # fail the build, while a genuine critical compromise anywhere still does.
      - name: Audit the full dependency tree
        run: npm audit --audit-level=critical

      # pa11y drives headless Chrome through Puppeteer. Cache the browser between
      # runs and install it explicitly so the Chrome launch cannot fail. The
      # no-sandbox args needed on the runner already live in .pa11yci.json.
      - name: Cache the Puppeteer browser
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: ~/.cache/puppeteer
          key: ${{ runner.os }}-puppeteer-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-puppeteer-

      # A restored cache can be partial (folder present, executable missing) if an
      # earlier run was interrupted mid-download; install then errors instead of
      # re-fetching. Wipe and retry once so a corrupt cache self-heals.
      - name: Install headless Chrome for pa11y
        run: npx puppeteer browsers install chrome || { rm -rf ~/.cache/puppeteer; npx puppeteer browsers install chrome; }

      # The four logical gates: Ajv structural validation plus referential
      # integrity, the editorial lint and the image-rights default-deny.
      - name: Run the prebuild gates
        run: npm run prebuild

      - name: Run the negative-fixture test suite
        run: npm test

      - name: Build the static site
        run: npm run build

      # Serve the already-built _site and run pa11y-ci against it (WCAG 2.2 AA).
      # start-server-and-test is a committed dependency, so npx resolves it from
      # node_modules and downloads nothing (no npx of an unverified package).
      - name: Run the accessibility floor
        run: npx start-server-and-test a11y:serve http://127.0.0.1:8081 a11y:ci
